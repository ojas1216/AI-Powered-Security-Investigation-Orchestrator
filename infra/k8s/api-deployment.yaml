apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api
  namespace: aegisflow
spec:
  replicas: 3
  selector:
    matchLabels: { app: aegis-api }
  template:
    metadata:
      labels: { app: aegis-api }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/aegisflow/api:latest
          ports: [{ containerPort: 8000 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          envFrom:
            # Sourced from Vault via External Secrets Operator (see externalsecret.yaml).
            - secretRef: { name: aegis-api-secrets }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /api/v1/healthz, port: 8000 }
            initialDelaySeconds: 5
          readinessProbe:
            httpGet: { path: /api/v1/readyz, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-api
  namespace: aegisflow
spec:
  selector: { app: aegis-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-api
  namespace: aegisflow
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: aegis-api }
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
