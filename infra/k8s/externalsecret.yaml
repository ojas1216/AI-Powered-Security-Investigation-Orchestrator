# Pulls runtime secrets from HashiCorp Vault via the External Secrets Operator.
# No secret material lives in Git or in plain Kubernetes manifests.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aegis-api-secrets
  namespace: aegisflow
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aegis-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: AEGIS_SECRET_KEY
      remoteRef: { key: aegisflow/api, property: secret_key }
    - secretKey: AEGIS_DATABASE_URL
      remoteRef: { key: aegisflow/api, property: database_url }
    - secretKey: AEGIS_VIRUSTOTAL_API_KEY
      remoteRef: { key: aegisflow/ti, property: virustotal }
    - secretKey: AEGIS_ABUSEIPDB_API_KEY
      remoteRef: { key: aegisflow/ti, property: abuseipdb }
