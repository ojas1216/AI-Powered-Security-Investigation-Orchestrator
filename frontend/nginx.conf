server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ── Security headers (enterprise hardening) ────────────────────────────────
  # Trusted Types is enforced; the app installs a DOMPurify-backed "default" policy
  # (src/security/trustedTypes.ts). connect-src must list the real API + Keycloak
  # origins for your deployment (defaults cover the bundled compose stack).
  add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://localhost:8000 http://localhost:8080; frame-ancestors 'none'; base-uri 'none'; form-action 'self'; require-trusted-types-for 'script'; trusted-types default" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # Proxy API to the backend so the SPA is same-origin with the API (tightens CSP,
  # avoids CORS). In the compose network the backend service is 'api'.
  location /api/ {
    # Use Docker's embedded DNS and a variable upstream so nginx starts even if the
    # API isn't resolvable yet (resolution is deferred to request time).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream "http://api:8000";
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Long-cache fingerprinted assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA history fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
