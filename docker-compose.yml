# Full local stack. The backend runs fine standalone in mock mode; this brings up
# the supporting services for the live/integrated experience.
name: aegisflow

services:
  # One-shot: applies the Alembic schema + RLS policies as the owner role 'aegis'.
  migrate:
    build: ./backend
    entrypoint: ["/venv/bin/python", "-c", "from alembic.config import main; main(['upgrade','head'])"]
    environment:
      AEGIS_DATABASE_URL: postgresql+psycopg://aegis:aegis@postgres:5432/aegis
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: ./backend
    environment:
      AEGIS_ENV: local
      AEGIS_CONNECTOR_MODE: mock
      AEGIS_PERSISTENCE: postgres
      # Real OIDC — the dev bypass is OFF in the compose stack. Tokens are minted by
      # Keycloak; the issuer is the user-facing localhost URL while JWKS is fetched
      # over the internal docker network.
      AEGIS_OIDC_ISSUER: http://localhost:8080/realms/aegisflow
      AEGIS_OIDC_AUDIENCE: aegisflow-api
      AEGIS_OIDC_JWKS_URL: http://keycloak:8080/realms/aegisflow/protocol/openid-connect/certs
      # Connects as the least-privilege role so RLS is enforced (NOT 'aegis').
      AEGIS_DATABASE_URL: postgresql+psycopg://aegis_app:aegis_app@postgres:5432/aegis
      AEGIS_REDIS_URL: redis://redis:6379/0
      AEGIS_NEO4J_URI: bolt://neo4j:7687
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - "./infra/keycloak/realm-aegisflow.json:/opt/keycloak/data/import/realm-aegisflow.json:ro"
    ports: ["8080:8080"]

  web:
    build: ./frontend
    ports: ["5173:8080"]
    depends_on: [api]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports: ["5432:5432"]
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
      - "./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/10-app-role.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/aegis-neo4j
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j-data:/data"]

  # Identity, workflow, streaming and observability are declared here for the
  # integrated stack; uncomment to bring them up.
  # keycloak: { image: quay.io/keycloak/keycloak:25.0, command: ["start-dev"], ports: ["8080:8080"] }
  # temporal: { image: temporalio/auto-setup:1.24, ports: ["7233:7233"] }
  # kafka:    { image: bitnami/kafka:3.7, ports: ["9092:9092"] }

volumes:
  postgres-data:
  neo4j-data:
